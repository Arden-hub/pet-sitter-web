<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <title>評價保母</title>
    <style>
        body { font-family: "Microsoft JhengHei", sans-serif; background: #fff9f0; text-align: center; padding: 50px; }
        .box { background: white; padding: 30px; border-radius: 20px; max-width: 400px; margin: 0 auto; box-shadow: 0 5px 15px rgba(0,0,0,0.1); }
        select, textarea { width: 100%; margin: 10px 0; padding: 10px; border-radius: 8px; border: 1px solid #ddd; }
        button { background: #e67e22; color: white; border: none; padding: 12px 20px; border-radius: 8px; cursor: pointer; width: 100%; font-weight: bold; }
    </style>
</head>
<body>
    <div class="box">
        <h2 id="nannyNameDisplay">評價保母</h2>
        <select id="stars">
            <option value="5">⭐⭐⭐⭐⭐ (完美)</option>
            <option value="4">⭐⭐⭐⭐ (優秀)</option>
            <option value="3">⭐⭐⭐ (普通)</option>
            <option value="2">⭐⭐ (待加強)</option>
            <option value="1">⭐ (極差)</option>
        </select>
        <textarea id="comment" placeholder="寫下您對保母的評價..." rows="4"></textarea>
        <button onclick="submitReview()">送出評價</button>
    </div>

    <script>
        // 從網址抓取保母名字
        const urlParams = new URLSearchParams(window.location.search);
        const nannyId = urlParams.get('nanny') || '未知名保母';
        document.getElementById('nannyNameDisplay').innerText = '評價保母：' + nannyId;

        async function submitReview() {
            const stars = document.getElementById('stars').value;
            const comment = document.getElementById('comment').value.trim();
            
            if(!comment) return alert('請輸入評價內容');

            const response = await fetch('/api/submit_review', {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify({ nanny_id: nannyId, stars: parseInt(stars), comment: comment })
            });

            if(response.ok) {
                alert('感謝您的評價！');
                window.location.href = '/nanny';
            }
        }
    </script>
</body>
</html>

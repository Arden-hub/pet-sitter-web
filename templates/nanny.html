    <style>
        body { font-family: "Microsoft JhengHei", sans-serif; background: #fff9f0; margin: 0; padding: 40px 20px; }
        .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(280px, 1fr)); gap: 30px; max-width: 1200px; margin: 0 auto; }
        .card { background: white; border-radius: 20px; border: 2px solid #e67e22; overflow: hidden; display: flex; flex-direction: column; transition: 0.3s; }
        .card:hover { transform: translateY(-10px); box-shadow: 0 10px 20px rgba(230, 126, 34, 0.2); }
        
        /* 照片容器：保持比例，背景灰色墊底 */
        .img-box { 
            width: 100%; 
            height: 300px; 
            background: #f0f0f0; 
            display: flex;
            align-items: center;
            justify-content: center;
        }
        
        /* 關鍵：使用 contain 確保照片不切邊 */
        .img-box img { 
            max-width: 100%; 
            max-height: 100%; 
            object-fit: contain; 
        }
        
        .info { padding: 20px; text-align: center; }
        .name { font-size: 1.5rem; font-weight: bold; color: #e67e22; margin-bottom: 10px; }
        .shout { background: #fffcf5; border: 1px solid #ffe8cc; padding: 15px; border-radius: 10px; font-style: italic; min-height: 60px; display: flex; align-items: center; justify-content: center; }
        .footer { height: 8px; background: #e67e22; }
    </style>
</head>

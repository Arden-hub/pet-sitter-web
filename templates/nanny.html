<div class="review-display" style="min-height: 60px;">
    {% if stats and stats.get(name) %}
        {% set s = stats.get(name) %}
        <div style="display: flex; align-items: center; justify-content: center; gap: 5px;">
            <span style="color: #f1c40f;">{{ "⭐" * s.display_stars }}</span>
            <span style="color: #e67e22; font-weight: bold;">{{ s.avg_stars }}</span>
            <span style="color: #95a5a6; font-size: 0.8rem;">({{ s.count }} 則)</span>
        </div>
        <div style="font-size: 0.75rem; color: #95a5a6; margin-top: 5px; text-align: center; white-space: nowrap; overflow: hidden; text-overflow: ellipsis;">
            最新：{{ s.latest_content }}
        </div>
    {% else %}
        <div style="color: #bdc3c7; text-align: center; font-size: 0.85rem;">尚無評價</div>
    {% endif %}
</div>

<a href="/feedback/{{ name }}" class="review-btn">⭐ 我要評價</a>

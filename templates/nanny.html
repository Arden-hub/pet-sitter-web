<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <title>保母團隊</title>
    <style>
        body { font-family: "Microsoft JhengHei", sans-serif; background: #fff9f0; padding: 20px; }
        .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(200px, 1fr)); gap: 20px; max-width: 1000px; margin: 0 auto; }
        .card { background: white; border-radius: 15px; overflow: hidden; text-align: center; padding-bottom: 15px; box-shadow: 0 5px 15px rgba(0,0,0,0.05); }
        .img-box { width: 100%; aspect-ratio: 4/5; background: #eee; }
        .img-box img { width: 100%; height: 100%; object-fit: contain; }
        .name { font-weight: bold; color: #e67e22; font-size: 1.2rem; margin: 10px 0; }
        .stars { color: #f1c40f; }
    </style>
</head>
<body>
    <h1 style="text-align:center; color:#e67e22;">🐾 我們的保母團隊</h1>
    <div id="list" class="grid"></div>
    <script>
        const nannies = ["Mio","阿強","小花","Yuki","阿明","Bella","Kevin","莉莉","Nana","大王"];
        async function load() {
            const list = document.getElementById('list');
            list.innerHTML = nannies.map(n => `
                <div class="card">
                    <div class="img-box"><img src="/static/Photos of pet sitters/${n}.jpg" onerror="this.src='https://via.placeholder.com/200x250'"></div>
                    <div class="name">${n}</div>
                    <div class="stars" id="s-${n}">★ 載入中</div>
                </div>`).join('');
            const res = await fetch('/api/get_reviews');
            const data = await res.json();
            nannies.forEach(n => {
                const rs = data.filter(r => r.nanny === n);
                const el = document.getElementById(`s-${n}`);
                if(rs.length) {
                    const avg = (rs.reduce((a,b)=>a+b.stars,0)/rs.length).toFixed(1);
                    el.innerHTML = '★ '.repeat(Math.round(avg)) + avg;
                } else { el.innerHTML = '★ 新加入'; }
            });
        }
        load();
    </script>
</body>
</html>

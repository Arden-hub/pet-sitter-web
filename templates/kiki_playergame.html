<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <title>Kiki's Level Adventure</title>
    <script src="https://cdn.jsdelivr.net/npm/phaser@3.60.0/dist/phaser.min.js"></script>
    <style> 
        body { margin: 0; background-color: #222; display: flex; justify-content: center; align-items: center; height: 100vh; overflow: hidden; }
        #game-container { border: 4px solid #444; }
    </style>
</head>
<body>
    <div id="game-container"></div>

<script>
// 1. 完整保留您的多關卡數據
const levelData = [
    { 
        platforms: [[400, 580, 2], [600, 450, 0.6], [250, 350, 0.6], [500, 200, 0.6]],
        goal: { x: 500, y: 150 }
    },
    { 
        platforms: [[400, 580, 2], [100, 420, 0.5], [400, 320, 0.5], [700, 220, 0.5]],
        goal: { x: 700, y: 160 }
    },
    { 
        platforms: [[100, 580, 0.6], [300, 480, 0.4], [500, 380, 0.4], [700, 280, 0.4], [400, 180, 0.4]],
        goal: { x: 400, y: 120 }
    }
];

class MainScene extends Phaser.Scene {
    constructor() {
        super('MainScene');
        this.currentLevel = 0;
    }

    preload() {
        // 關鍵修正：宣告跨網域匿名存取，解決圖片變黑點的問題
        this.load.crossOrigin = 'anonymous'; 
        this.load.image('playerCat', 'https://storage.googleapis.com/pet-sitter-images/kiki_playergame/kiki_player.png');
        this.load.image('ground', 'https://labs.phaser.io/assets/sprites/platform.png');
        this.load.image('star', 'https://labs.phaser.io/assets/demoscene/star.png');
    }

    create() {
        // 修正：必須在此呼叫 loadLevel，平台才會出現
        this.loadLevel();
    }

    loadLevel() {
        // 清除上一關物體
        if (this.platforms) this.platforms.clear(true, true);
        if (this.player) this.player.destroy();
        if (this.goal) this.goal.destroy();

        const data = levelData[this.currentLevel];

        this.platforms = this.physics.add.staticGroup();
        data.platforms.forEach(p => {
            this.platforms.create(p[0], p[1], 'ground').setScale(p[2]).refreshBody();
        });

        this.player = this.physics.add.sprite(100, 450, 'playerCat');
        this.player.setScale(0.05); // 維持您要求的 0.05
        this.player.setCollideWorldBounds(true);
        this.player.setBounce(0.1);
        this.player.setDragX(1200);

        this.goal = this.physics.add.sprite(data.goal.x, data.goal.y, 'star');
        this.goal.body.allowGravity = false;

        this.physics.add.collider(this.player, this.platforms);
        this.physics.add.overlap(this.player, this.goal, this.reachGoal, null, this);

        this.cursors = this.input.keyboard.createCursorKeys();

        if (this.scoreText) this.scoreText.destroy();
        this.scoreText = this.add.text(16, 16, 'Level: ' + (this.currentLevel + 1), { fontSize: '24px', fill: '#000' });
    }

    reachGoal() {
        this.currentLevel++;
        if (this.currentLevel < levelData.length) {
            this.loadLevel();
        } else {
            this.add.text(200, 250, '恭喜破關！🎉', { fontSize: '64px', fill: '#000', backgroundColor: '#fff' });
            this.physics.pause();
        }
    }

    update() {
        if (!this.player || !this.player.body) return;

        if (this.cursors.left.isDown) {
            this.player.setVelocityX(-280);
            this.player.flipX = true;
        } else if (this.cursors.right.isDown) {
            this.player.setVelocityX(280);
            this.player.flipX = false;
        } else {
            this.player.setVelocityX(0);
        }

        if (this.cursors.up.isDown && this.player.body.touching.down) {
            this.player.setVelocityY(-650);
        }
    }
}

const config = {
    type: Phaser.AUTO,
    parent: 'game-container',
    width: 800,
    height: 600,
    backgroundColor: '#87CEEB',
    physics: {
        default: 'arcade',
        arcade: { 
            gravity: { y: 1300 }, // 保留您的重力設定
            debug: false 
        }
    },
    scene: MainScene
};

const game = new Phaser.Game(config);
</script>
</body>
</html>

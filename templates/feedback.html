<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <title>評價 {{ nanny_name }}</title>
    <style>
        body { font-family: sans-serif; background: #fff9f0; text-align: center; padding: 50px 20px; }
        .box { background: white; padding: 40px; border-radius: 20px; max-width: 400px; margin: 0 auto; box-shadow: 0 5px 15px rgba(0,0,0,0.1); }
        .stars-container { margin: 20px 0; font-size: 35px; cursor: pointer; }
        .star { color: #ddd; }
        .star.active { color: #f1c40f; }
        textarea { width: 100%; height: 120px; margin-bottom: 20px; padding: 10px; border-radius: 10px; border: 1px solid #ddd; box-sizing: border-box; }
        button { width: 100%; background: #e67e22; color: white; border: none; padding: 15px; border-radius: 10px; cursor: pointer; font-weight: bold; }
    </style>
</head>
<body>
    <div class="box">
        <h2>⭐ 評價：{{ nanny_name }}</h2>
        <div class="stars-container" id="starRating">
            <span class="star active" data-val="1">★</span>
            <span class="star active" data-val="2">★</span>
            <span class="star active" data-val="3">★</span>
            <span class="star active" data-val="4">★</span>
            <span class="star active" data-val="5">★</span>
        </div>
        <p id="starHint" style="color: #e67e22;">給予 5 星好評</p>
        <textarea id="feedbackContent" placeholder="寫點什麼吧..."></textarea>
        <button onclick="sendNow()">送出評價</button>
    </div>

    <script>
        let currentStars = 5;
        const stars = document.querySelectorAll('.star');

        stars.forEach(s => {
            s.onclick = function() {
                currentStars = parseInt(this.getAttribute('data-val'));
                stars.forEach(el => {
                    el.classList.toggle('active', parseInt(el.getAttribute('data-val')) <= currentStars);
                });
                document.getElementById('starHint').innerText = `給予 ${currentStars} 星評分`;
            };
        });

        async function sendNow() {
            const txt = document.getElementById('feedbackContent').value.trim();
            if(!txt) return alert('請輸入內容');

            const payload = {
                nanny: "{{ nanny_name }}",
                stars: currentStars, // 這裡絕對會抓到變數！
                content: txt
            };

            const res = await fetch('/api/submit_feedback', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify(payload)
            });

            if (res.ok) {
                alert('感謝評價！');
                window.location.href = '/nanny';
            }
        }
    </script>
</body>
</html>

<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <title>意見回饋</title>
    <style>
        body { font-family: sans-serif; background: #fff9f0; text-align: center; padding: 50px; }
        .box { background: white; padding: 30px; border-radius: 20px; max-width: 400px; margin: 0 auto; }
        .stars span { font-size: 2rem; color: #ccc; cursor: pointer; }
        .stars span.active { color: #f1c40f; }
        select, textarea, button { width: 100%; margin: 10px 0; padding: 10px; border-radius: 10px; border: 1px solid #ddd; }
        button { background: #e67e22; color: white; border: none; font-weight: bold; cursor: pointer; }
    </style>
</head>
<body>
    <div class="box">
        <h2>🐾 意見回饋</h2>
        <select id="n">
            <option value="一般性建議">💡 一般性建議</option>
            <option value="Mio">Mio</option><option value="阿強">阿強</option>
            <option value="小花">小花</option><option value="Yuki">Yuki</option>
            <option value="阿明">阿明</option><option value="Bella">Bella</option>
            <option value="Kevin">Kevin</option><option value="莉莉">莉莉</option>
            <option value="Nana">Nana</option><option value="大王">大王</option>
        </select>
        <div class="stars" id="sg">
            <span data-v="1">★</span><span data-v="2">★</span><span data-v="3">★</span><span data-v="4">★</span><span data-v="5">★</span>
        </div>
        <textarea id="c" placeholder="您的建議..."></textarea>
        <button onclick="send()">送出回饋</button>
    </div>
    <script>
        let cur = 0;
        document.querySelectorAll('#sg span').forEach(s => {
            s.onclick = function() {
                cur = this.dataset.v;
                document.querySelectorAll('#sg span').forEach(x => x.classList.toggle('active', x.dataset.v <= cur));
            }
        });
        async function send() {
            const n = document.getElementById('n').value;
            const c = document.getElementById('c').value;
            if(!c || (n!=='一般性建議' && cur==0)) return alert('請填寫完整');
            await fetch('/api/submit_feedback', {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify({nanny:n, stars:cur||5, content:c})
            });
            alert('感謝回饋'); window.location.href='/nanny';
        }
    </script>
</body>
</html>

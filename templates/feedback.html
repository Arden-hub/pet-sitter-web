<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <title>評價 {{ nanny_name }}</title>
    <style>
        body { font-family: sans-serif; background: #fff9f0; text-align: center; padding: 50px 20px; }
        .box { background: white; padding: 40px; border-radius: 20px; max-width: 400px; margin: 0 auto; box-shadow: 0 5px 15px rgba(0,0,0,0.1); }
        h2 { color: #e67e22; }
        textarea { width: 100%; height: 150px; margin: 20px 0; padding: 10px; border-radius: 10px; border: 1px solid #ddd; box-sizing: border-box; }
        button { width: 100%; background: #e67e22; color: white; border: none; padding: 15px; border-radius: 10px; cursor: pointer; font-weight: bold; }
    </style>
</head>
<body>
    <div class="box">
        <h2>🐾 {% if nanny_name == "一般性建議" %}意見回饋{% else %}評價保母：{{ nanny_name }}{% endif %}</h2>
        <p>請寫下您對 {{ nanny_name }} 的想法：</p>
        
        <textarea id="feedbackContent" placeholder="請輸入內容..."></textarea>
        <button onclick="sendFeedback()">送出回饋</button>
    </div>

    <script>
        async function sendFeedback() {
            const content = document.getElementById('feedbackContent').value.trim();
            if (!content) return alert('請輸入內容');

            const payload = {
                nanny: "{{ nanny_name }}", // 直接把 Flask 傳過來的名字塞進去
                content: content
            };

            const response = await fetch('/api/submit_feedback', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify(payload)
            });

            if (response.ok) {
                alert('感謝回饋！');
                window.location.href = '/nanny';
            }
        }
    </script>
</body>
</html>

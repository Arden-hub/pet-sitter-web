<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>鏟屎官到你家 - Facebook</title>
    <style>
        :root { 
            --primary: #e67e22; 
            --bg-warm: #fff9f0; 
            --text-dark: #5d4037; 
        }
        body { 
            background-color: var(--bg-warm); 
            color: var(--text-dark); 
            font-family: "Microsoft JhengHei", sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
            text-align: center;
        }
        .container {
            background: #fff;
            padding: 40px;
            border-radius: 20px;
            box-shadow: 0 10px 20px rgba(0,0,0,0.05);
            max-width: 400px;
            width: 90%;
        }
        .btn-social {
            display: block;
            background: #1877F2;
            color: white;
            text-decoration: none;
            padding: 15px;
            border-radius: 12px;
            font-weight: bold;
            margin: 20px 0;
            font-size: 1.1rem;
        }
        .btn-back {
            color: var(--primary);
            text-decoration: none;
            font-size: 0.9rem;
            font-weight: bold;
        }
    </style>
</head>
<body>
    <div class="container">
        <h2 style="color: var(--primary);">💙 加入我們的臉書</h2>
        <p>與其他鏟屎官交流心得！</p>
        <a href="https://www.facebook.com/sweetcat.mami/" target="_blank" class="btn-social">前往 Facebook</a>
        <br>
        <a href="index.html" class="btn-back">← 回到首頁</a>
    </div>
</body>
</html>
